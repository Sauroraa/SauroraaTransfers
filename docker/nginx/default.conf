server {
    listen 80;
    server_name dl.sauroraa.be;
    return 301 https://dl.sauroraa.be$request_uri;
}

server {
    listen 80 default_server;
    server_name _;
    return 301 https://dl.sauroraa.be$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name dl.sauroraa.be;

    ssl_certificate /etc/letsencrypt/live/dl.sauroraa.be/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dl.sauroraa.be/privkey.pem;

    client_max_body_size 2048m;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location /api/ {
        proxy_pass http://api:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:4173/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
